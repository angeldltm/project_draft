<!DOCTYPE html>
<html>
<head>
  <title>Calculadora Precio Vivienda</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      text-align: center;
    }
    input, select {
      padding: 8px;
      width: 80%;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    h3 {
      color: #2c3e50;
      white-space: pre-line;
    }

    /* Barra de color */
    .barra-container {
      width: 80%;
      height: 25px;
      margin: 20px auto;
      background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c);
      border-radius: 10px;
      position: relative;
    }

    .marcador {
      position: absolute;
      top: -5px;
      width: 4px;
      height: 35px;
      background: black;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>

<h2>Calculadora de precio por m²</h2>

<label>Municipio (ej: Madrid):</label><br>
<input type="text" id="direccion" placeholder="Ej: Madrid"><br>

<label>Tipo de vivienda:</label><br>
<select id="tipo">
  <option value="COLECTIVA">Colectiva</option>
  <option value="UNIFAMILIAR">Unifamiliar</option>
</select><br>

<label>Metros cuadrados:</label><br>
<input type="number" id="metros" placeholder="Ej: 100"><br>

<label>Precio (€):</label><br>
<input type="number" id="precio" placeholder="Ej: 250000"><br>

<button onclick="calcular()">Calcular</button>

<!-- Barra de desviación -->
<div class="barra-container">
  <div id="marcador" class="marcador"></div>
</div>

<h3 id="resultado"></h3>

<script>
function normalizarTexto(texto) {
  return texto
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// Función para mapear % a posición en la barra
function calcularPosicion(diferencia) {
  // Limitamos entre -50% y +50% para visualización
  const limite = 50;
  let valor = Math.max(-limite, Math.min(limite, diferencia));

  // Convertimos a 0-100%
  return ((valor + limite) / (2 * limite)) * 100;
}

async function calcular() {
  const direccion = document.getElementById("direccion").value;
  const tipo = document.getElementById("tipo").value;
  const metros = parseFloat(document.getElementById("metros").value);
  const precio = parseFloat(document.getElementById("precio").value);

  if (!direccion || !metros || metros <= 0 || !precio || precio <= 0) {
    document.getElementById("resultado").innerText = "Introduce datos válidos";
    return;
  }

  let municipio = normalizarTexto(direccion);
  let codigo = municipio + "_" + tipo;

  try {
    const response = await fetch("datos_municipios.json");
    const data = await response.json();

    const registro = data.find(x => 
      normalizarTexto(x["codigo unico"]) === codigo
    );

    if (!registro) {
      document.getElementById("resultado").innerText =
        "No hay datos para ese municipio/tipo";
      return;
    }

    const precioUsuario = precio / metros;
    const precioMedio = parseFloat(registro["Precio m2"]);

    if (isNaN(precioMedio)) {
      document.getElementById("resultado").innerText =
        "No hay precio medio disponible para este municipio";
      return;
    }

    const diferencia = ((precioUsuario - precioMedio) / precioMedio) * 100;

    // Mostrar resultado
    document.getElementById("resultado").innerText =
      `Tu precio m²: ${precioUsuario.toFixed(2)} €/m²\n` +
      `Precio medio en la zona: ${precioMedio.toFixed(2)} €/m²\n` +
      `Desviación: ${diferencia.toFixed(2)}%\n\n` +
      `Superficie media en la zona: ${registro["superficie media"]} m²\n` +
      `Número de viviendas en el municipio: ${registro["VIVIENDAS"]}`;

    // 🔥 Actualizar barra
    const posicion = calcularPosicion(diferencia);
    const marcador = document.getElementById("marcador");
    marcador.style.left = posicion + "%";

    // Cambiar color del marcador según desviación
    if (Math.abs(diferencia) < 5) {
      marcador.style.background = "#2ecc71"; // verde
    } else if (Math.abs(diferencia) < 30) {
      marcador.style.background = "#f1c40f"; // amarillo
    } else {
      marcador.style.background = "#e74c3c"; // rojo
    }

  } catch (error) {
    console.error(error);
    document.getElementById("resultado").innerText =
      "Error cargando datos. Revisa el JSON.";
  }
}
</script>

</body>
</html>
