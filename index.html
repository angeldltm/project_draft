<!DOCTYPE html>
<html>
<head>
  <title>Calculadora Precio Vivienda</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      text-align: center;
    }
    input, select {
      padding: 8px;
      width: 80%;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    h3 {
      color: #2c3e50;
      white-space: pre-line;
    }
  </style>
</head>
<body>

<h2>Calculadora de precio por m²</h2>

<label>Municipio (ej: Madrid):</label><br>
<input type="text" id="direccion" placeholder="Ej: Madrid"><br>

<label>Tipo de vivienda:</label><br>
<select id="tipo">
  <option value="COLECTIVA">Colectiva</option>
  <option value="UNIFAMILIAR">Unifamiliar</option>
</select><br>

<label>Metros cuadrados:</label><br>
<input type="number" id="metros" placeholder="Ej: 100"><br>

<label>Precio (€):</label><br>
<input type="number" id="precio" placeholder="Ej: 250000"><br>

<button onclick="calcular()">Calcular</button>

<h3 id="resultado"></h3>

<script>
function normalizarTexto(texto) {
  return texto
    .trim()
    .toUpperCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

async function calcular() {
  const direccion = document.getElementById("direccion").value;
  const tipo = document.getElementById("tipo").value;
  const metros = parseFloat(document.getElementById("metros").value);
  const precio = parseFloat(document.getElementById("precio").value);

  if (!direccion || !metros || metros <= 0 || !precio || precio <= 0) {
    document.getElementById("resultado").innerText = "Introduce datos válidos";
    return;
  }

  let municipio = normalizarTexto(direccion);
  let codigo = municipio + "_" + tipo;

  console.log("Código buscado:", codigo);

  try {
    const response = await fetch("datos_municipios.json");
    const data = await response.json();

    console.log("Primer registro JSON:", data[0]);

    // Buscar usando la clave correcta del JSON
    const registro = data.find(x => 
      normalizarTexto(x["codigo unico"]) === codigo
    );

    if (!registro) {
      document.getElementById("resultado").innerText =
        "No hay datos para ese municipio/tipo";
      return;
    }

    const precioUsuario = precio / metros;

    // Convertir a número el precio medio
    const precioMedio = parseFloat(registro["Precio m2"]);

    if (isNaN(precioMedio)) {
      document.getElementById("resultado").innerText =
        "No hay precio medio disponible para este municipio";
      return;
    }

    const diferencia = ((precioUsuario - precioMedio) / precioMedio) * 100;

    document.getElementById("resultado").innerText =
      `Tu precio: ${precioUsuario.toFixed(2)} €/m²\n` +
      `Precio medio: ${precioMedio.toFixed(2)} €/m²\n` +
      `Diferencia: ${diferencia.toFixed(2)}%\n\n` +
      `Superficie media: ${registro["superficie media"]} m²\n` +
      `Número de viviendas: ${registro["VIVIENDAS"]}`;

  } catch (error) {
    console.error(error);
    document.getElementById("resultado").innerText =
      "Error cargando datos. Revisa el JSON.";
  }
}
</script>

</body>
</html>
